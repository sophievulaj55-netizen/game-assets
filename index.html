<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dog Fetch Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .game-container {
            width: 600px;
            height: 400px;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%);
            border: 3px solid #333;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        
        .dog {
            position: absolute;
            width: 50px;
            height: 50px;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 40px;
            cursor: pointer;
            user-select: none;
        }
        
        .ball {
            position: absolute;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle at 30% 30%, #FFD700, #FFA500);
            border-radius: 50%;
            cursor: grab;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }
        
        .ball:active {
            cursor: grabbing;
        }
        
        .score {
            position: absolute;
            top: 15px;
            left: 15px;
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }
        
        .instructions {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 10px;
            display: none;
            z-index: 100;
        }
        
        .instructions h1 {
            color: #667eea;
            margin-bottom: 15px;
        }
        
        .instructions p {
            color: #333;
            margin: 10px 0;
        }
        
        .instructions button {
            margin-top: 20px;
            padding: 10px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        
        .instructions button:hover {
            background: #764ba2;
        }
        
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 40px;
            border-radius: 10px;
            display: none;
            z-index: 100;
        }
        
        .game-over h1 {
            font-size: 32px;
            margin-bottom: 15px;
        }
        
        .game-over p {
            font-size: 24px;
            margin: 10px 0;
        }
        
        .game-over button {
            margin-top: 20px;
            padding: 10px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        
        .game-over button:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="score">Score: <span id="score">0</span></div>
        <div class="dog" id="dog">🐕</div>
        <div class="ball" id="ball"></div>
        
        <div class="instructions" id="instructions">
            <h1>🐕 Dog Fetch Game 🎾</h1>
            <p>Throw the ball to your dog!</p>
            <p>Click and drag the ball to throw it.</p>
            <p>Your dog will fetch it and bring it back.</p>
            <button onclick="startGame()">Start Game!</button>
        </div>
        
        <div class="game-over" id="gameOver">
            <h1>Game Over!</h1>
            <p>Final Score: <span id="finalScore">0</span></p>
            <button onclick="location.reload()">Play Again</button>
        </div>
    </div>
    
    <script>
        const gameContainer = document.querySelector('.game-container');
        const dog = document.getElementById('dog');
        const ball = document.getElementById('ball');
        const scoreDisplay = document.getElementById('score');
        const instructions = document.getElementById('instructions');
        const gameOverScreen = document.getElementById('gameOver');
        
        let score = 0;
        let gameActive = false;
        let ballDragging = false;
        let ballX, ballY;
        let dogX = gameContainer.offsetWidth / 2;
        let dogY = gameContainer.offsetHeight - 70;
        
        // Show instructions on load
        window.addEventListener('load', () => {
            instructions.style.display = 'block';
        });
        
        function startGame() {
            instructions.style.display = 'none';
            gameActive = true;
            resetBall();
        }
        
        function resetBall() {
            ballX = Math.random() * (gameContainer.offsetWidth - 20);
            ballY = Math.random() * (gameContainer.offsetHeight - 100);
            ball.style.left = ballX + 'px';
            ball.style.top = ballY + 'px';
        }
        
        ball.addEventListener('mousedown', (e) => {
            if (!gameActive) return;
            ballDragging = true;
            ball.style.cursor = 'grabbing';
        });
        
        document.addEventListener('mousemove', (e) => {
            if (!ballDragging || !gameActive) return;
            
            const rect = gameContainer.getBoundingClientRect();
            ballX = e.clientX - rect.left - 10;
            ballY = e.clientY - rect.top - 10;
            
            // Keep ball in bounds
            ballX = Math.max(0, Math.min(ballX, gameContainer.offsetWidth - 20));
            ballY = Math.max(0, Math.min(ballY, gameContainer.offsetHeight - 20));
            
            ball.style.left = ballX + 'px';
            ball.style.top = ballY + 'px';
        });
        
        document.addEventListener('mouseup', () => {
            if (ballDragging && gameActive) {
                ballDragging = false;
                ball.style.cursor = 'grab';
                throwBall();
            }
        });
        
        function throwBall() {
            // Calculate distance and direction
            const distX = dogX - (ballX + 10);
            const distY = dogY - (ballY + 10);
            const distance = Math.sqrt(distX * distX + distY * distY);
            
            // Move dog towards ball
            const duration = distance / 3;
            animateDog(ballX + 10, ballY + 10, duration);
            
            // After dog reaches ball, animate return
            setTimeout(() => {
                animateDog(gameContainer.offsetWidth / 2, gameContainer.offsetHeight - 70, 500);
                score++;
                scoreDisplay.textContent = score;
                
                // Spawn new ball
                setTimeout(resetBall, 300);
            }, duration);
        }
        
        function animateDog(targetX, targetY, duration) {
            const startX = dogX;
            const startY = dogY;
            const startTime = Date.now();
            
            function animate() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                
                dogX = startX + (targetX - startX) * progress;
                dogY = startY + (targetY - startY) * progress;
                
                dog.style.left = dogX + 'px';
                dog.style.top = dogY + 'px';
                
                if (progress < 1) {
                    requestAnimationFrame(animate);
                }
            }
            
            animate();
        }
    </script>
</body>
</html>
